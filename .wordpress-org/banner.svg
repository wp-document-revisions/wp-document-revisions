<svg width="1544" height="500" viewBox="0 0 1544 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="WP Document Revisions — WordPress version control plugin">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4F5F6"/>
      <stop offset="1" stop-color="#E7E9EB"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#3C5468" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1544" height="500" fill="url(#bg)"/>

  <!-- Document mark (blue doc with revision pages behind) -->
  <g transform="translate(300 250)">
    <g filter="url(#ds)">
      <!-- revision pages stacked behind -->
      <rect x="-86" y="-118" width="150" height="210" rx="16" fill="#C6D8ED" transform="rotate(-9 -11 -13)"/>
      <rect x="-78" y="-110" width="150" height="210" rx="16" fill="#9DBBDB" transform="rotate(-4.5 -3 -5)"/>
      <!-- front document -->
      <rect x="-70" y="-105" width="150" height="210" rx="16" fill="#4E84C4"/>
    </g>
    <!-- bulleted list contents -->
    <g>
      <circle cx="-40" cy="-58" r="9" fill="#FFFFFF"/>
      <rect x="-18" y="-66" width="74" height="15" rx="7.5" fill="#FFFFFF" opacity="0.92"/>
      <circle cx="-40" cy="-12" r="9" fill="#FFFFFF"/>
      <rect x="-18" y="-20" width="74" height="15" rx="7.5" fill="#FFFFFF" opacity="0.92"/>
      <circle cx="-40" cy="34" r="9" fill="#FFFFFF"/>
      <rect x="-18" y="26" width="54" height="15" rx="7.5" fill="#FFFFFF" opacity="0.92"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="470" y="222" font-family="PT Sans, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="92" fill="#48565F" letter-spacing="-1">WP Document Revisions</text>
  <text x="472" y="288" font-family="PT Sans, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="44" fill="#5E6A72" letter-spacing="0.3">Document management &amp; version control</text>
  <!-- Trust line -->
  <text x="473" y="340" font-family="PT Sans, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="26" fill="#5E6A72" letter-spacing="2.5">OPEN SOURCE&#160;&#160;&#183;&#160;&#160;TRUSTED SINCE 2011</text>
</svg>
