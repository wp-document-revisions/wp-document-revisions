# Based on https://github.com/wordpress/wp-plugin-dependencies
name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # Stage 1: Fast checks — lint, audit, and JS tests run first
    code-quality:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            TRAVIS_BUILD_DIR: ${{ github.workspace }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  extensions: mysqli

            - name: Cache Composer packages
              uses: actions/cache@v5
              with:
                  path: vendor
                  key: ${{ runner.os }}-php-8.2-${{ hashFiles('**/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-php-8.2-

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress

            - name: phpcs
              run: script/cibuild-phpcs

            - name: PHPStan
              run: bin/phpstan analyse --configuration=phpstan.neon.dist --no-progress --memory-limit=512M

            - name: Audit dependencies
              run: composer audit

    jest:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            matrix:
                node_version: [18, 20]
        name: JavaScript Tests (Node ${{ matrix.node_version }})
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node_version }}

            - name: Cache Node modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-${{ matrix.node_version }}-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-${{ matrix.node_version }}-

            - name: Install dependencies
              run: npm install

            - name: Run Jest tests
              run: npm test -- --ci --coverage --maxWorkers=2

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              if: matrix.node_version == 20
              with:
                  files: ./coverage/lcov.info
                  flags: javascript
                  name: javascript-coverage

    # Stage 2: PHPUnit tests — only run after Stage 1 passes
    phpunit:
        needs: [code-quality, jest]
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            fail-fast: true
            matrix:
                include:
                    - php-versions: '8.0'
                      wp-multisite: 0
                      coverage: false
                    - php-versions: '8.2'
                      wp-multisite: 0
                      coverage: true
                    - php-versions: '8.1'
                      wp-multisite: 1
                      coverage: false
        name: PHP ${{ matrix.php-versions }} Test WP latest MS ${{ matrix.wp-multisite }}
        steps:
            - name: Start DB
              run: sudo systemctl start mysql

            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-versions }}
                  extensions: fileinfo, imagick, mysqli, xml, zip, zlib
                  coverage: ${{ matrix.coverage && 'xdebug' || 'none' }}
                  tools: wp-cli, phpunit-polyfills, phpunit:9.5
              env:
                  COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Cache Composer packages
              uses: actions/cache@v5
              with:
                  path: vendor
                  key: ${{ runner.os }}-php-${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-php-${{ matrix.php-versions }}-

            - name: Composer install
              run: composer install --optimize-autoloader --prefer-dist --no-progress

            - name: Cache WordPress test framework
              uses: actions/cache@v5
              with:
                  path: |
                      /tmp/wordpress
                      /tmp/wordpress-tests-lib
                  key: wp-test-framework-latest

            - name: Install WP Tests
              run: bash script/install-wp-tests wordpress_test root root 127.0.0.1 latest
              env:
                  WP_MULTISITE: ${{ matrix.wp-multisite }}

            - name: phpunit tests
              run: |
                  echo "define('WP_TESTS_PHPUNIT_POLYFILLS_PATH', '$HOME/.composer/vendor/yoast/phpunit-polyfills');" >> /tmp/wordpress-tests-lib/wp-tests-config.php
                  /usr/local/bin/phpunit --config=phpunit9.xml
              env:
                  WP_MULTISITE: ${{ matrix.wp-multisite }}

            - name: Upload coverage to Codecov
              if: matrix.coverage
              uses: codecov/codecov-action@v5
              with:
                  flags: php
                  name: php-coverage

    # Extended PHPUnit matrix — push to main only
    phpunit-extended:
        needs: [code-quality, jest]
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            fail-fast: true
            matrix:
                include:
                    - php-versions: '8.0'
                      wp-multisite: 0
                    - php-versions: '8.1'
                      wp-multisite: 0
                    - php-versions: '8.3'
                      wp-multisite: 0
                    - php-versions: '8.0'
                      wp-multisite: 1
        name: PHP ${{ matrix.php-versions }} Test WP latest MS ${{ matrix.wp-multisite }}
        steps:
            - name: Start DB
              run: sudo systemctl start mysql

            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-versions }}
                  extensions: fileinfo, imagick, mysqli, xml, zip, zlib
                  coverage: none
                  tools: wp-cli, phpunit-polyfills, phpunit:9.5
              env:
                  COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Cache Composer packages
              uses: actions/cache@v5
              with:
                  path: vendor
                  key: ${{ runner.os }}-php-${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-php-${{ matrix.php-versions }}-

            - name: Composer install
              run: composer install --optimize-autoloader --prefer-dist --no-progress

            - name: Cache WordPress test framework
              uses: actions/cache@v5
              with:
                  path: |
                      /tmp/wordpress
                      /tmp/wordpress-tests-lib
                  key: wp-test-framework-latest

            - name: Install WP Tests
              run: bash script/install-wp-tests wordpress_test root root 127.0.0.1 latest
              env:
                  WP_MULTISITE: ${{ matrix.wp-multisite }}

            - name: phpunit tests
              run: |
                  echo "define('WP_TESTS_PHPUNIT_POLYFILLS_PATH', '$HOME/.composer/vendor/yoast/phpunit-polyfills');" >> /tmp/wordpress-tests-lib/wp-tests-config.php
                  /usr/local/bin/phpunit --config=phpunit9.xml
              env:
                  WP_MULTISITE: ${{ matrix.wp-multisite }}

    # E2E tests — Playwright against a real WordPress instance
    e2e:
        needs: [code-quality, jest]
        runs-on: ubuntu-latest
        permissions:
            contents: read
        name: E2E Tests
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 20

            - name: Cache Node modules
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-20-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-20-

            - name: Install dependencies
              run: npm install

            - name: Get Playwright version
              id: playwright-version
              run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v5
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install chromium

            - name: Start WordPress environment
              run: npx wp-env start

            - name: Wait for WordPress to be ready
              run: |
                  echo "Waiting for WordPress to respond..."
                  wp_ready=false
                  for i in $(seq 1 30); do
                    if curl --connect-timeout 2 --max-time 5 -s -o /dev/null -w '%{http_code}' http://localhost:8888 | grep -qE '200|302'; then
                      echo "WordPress is responding"
                      wp_ready=true
                      break
                    fi
                    echo "Waiting for WordPress... ($i/30)"
                    sleep 2
                  done

                  if [ "$wp_ready" != "true" ]; then
                    echo "WordPress failed to respond"
                    docker ps -a
                    npx wp-env logs
                    exit 1
                  fi

                  echo "Waiting for REST API to respond..."
                  for i in $(seq 1 30); do
                    if curl --connect-timeout 2 --max-time 5 -s -o /dev/null -w '%{http_code}' http://localhost:8888/wp-json/wp/v2/ | grep -qE '200'; then
                      echo "REST API is ready"
                      exit 0
                    fi
                    echo "Waiting for REST API... ($i/30)"
                    sleep 2
                  done
                  echo "REST API failed to respond"
                  docker ps -a
                  npx wp-env logs
                  exit 1

            - name: Run E2E tests
              run: npm run test:e2e

            - name: Upload test artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-results
                  path: |
                      tests/e2e/results/
                  retention-days: 7
