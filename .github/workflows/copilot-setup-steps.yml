name: Copilot Setup Steps

on:
  workflow_dispatch:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, pdo_mysql
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Set up MySQL
        run: |
          sudo systemctl start mysql.service
          mysql -u root -proot -e "CREATE DATABASE IF NOT EXISTS wordpress_test;"

      - name: Install Composer dependencies
        run: |
          composer install --optimize-autoloader --prefer-dist --no-interaction
        timeout-minutes: 5

      - name: Install Node.js dependencies and build blocks
        run: |
          npm install
          npm run build:blocks
        timeout-minutes: 5

      - name: Verify tool installation
        run: |
          echo "Verifying development tools..."
          for tool in bin/phpcs bin/phpcbf bin/phpunit bin/phpstan; do
            if [ ! -f "$tool" ]; then
              echo "Error: $tool not installed"
              exit 1
            fi
          done
          echo "All PHP tools verified"

      - name: Install WordPress test environment
        run: |
          bash script/install-wp-tests wordpress_test root root 127.0.0.1 latest true
        timeout-minutes: 5

      - name: Verify setup
        run: |
          echo "Development environment setup complete!"
          echo "- PHP: $(php -v | head -1)"
          echo "- Node: $(node --version)"
          echo "- Composer: $(composer --version)"
          echo "- PHPCS: $(bin/phpcs --version)"
          echo "- PHPUnit: $(bin/phpunit --version)"
          echo "- PHPStan: $(bin/phpstan --version)"
