# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
    - package-ecosystem: 'composer'
      directory: '/'
      schedule:
          interval: 'weekly'
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
      # jest-environment-jsdom 30.x bundles a newer jsdom in which
      # `window.location` is non-configurable, breaking the test-suite
      # setup.js mock. Pin to the 29.x line until that compatibility work
      # is done. See tests/js/setup.js and PR #519 for context.
      ignore:
          - dependency-name: 'jest-environment-jsdom'
            update-types: ['version-update:semver-major']
